category = "vision-screenshot"
max_tokens = 1024
image = "prompts/images/screenshot.png"
text = "Analyze this screenshot. What application is shown? What programming language is the code written in? Transcribe the visible code, describe what it does, and identify any notable features of the editor's configuration."

