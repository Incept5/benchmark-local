# Qwen3.5 large models: 122B-A10B (MoE), 35B-A3B (MoE), 27B + distilled variants
# Run first — these take the most memory and time

[benchmark]
warmup_runs = 2
measured_runs = 10
max_tokens = 2048
temperature = 0.0
randomize_order = true
prompt_suite = "prompts/suite.toml"
output_dir = "results"
batch_sizes = [1]
batch_runs = 3

# --- Qwen3.5 122B-A10B (MoE) ---
[[model_family]]
name = "Qwen3.5 122B-A10B"
kind = "text"
size = "122B-A10B"
variants = [
    { repo = "/Users/jdavies/.lmstudio/models/mlx-community/Qwen3.5-122B-A10B-4bit", quant = "4bit" },
]
reference = "4bit"

